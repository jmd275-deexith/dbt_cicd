name: dbt CI

# Runs on every pull request targeting main.
# Blocks the PR merge if any job fails.
on:
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Code Quality ────────────────────────────────────────────────────
  # Runs pre-commit hooks across all files.
  # Covers: trailing whitespace, YAML validity, SQLFluff lint, commitizen message.
  # No Snowflake credentials required.
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install pre-commit commitizen sqlfluff

      - name: Run pre-commit on all files
        run: pre-commit run --all-files

  # ── Job 2: dbt Validate ────────────────────────────────────────────────────
  # Installs dbt, connects to Snowflake, compiles all models.
  # Only runs after Job 1 passes.
  # Requires Snowflake secrets in GitHub → Settings → Secrets → Actions.
  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    needs: code-quality  # waits for Job 1 to pass before starting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      # Builds profiles.yml on the fly from GitHub Secrets.
      # profiles.yml is gitignored — credentials never touch the repo.
      - name: Create profiles.yml from secrets
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - << 'EOF'
          import os, yaml
          profile = {
              "atlas_analytics": {
                  "target": "ci",
                  "outputs": {
                      "ci": {
                          "type": "snowflake",
                          "account": os.environ["SNOWFLAKE_ACCOUNT"],
                          "user": os.environ["SNOWFLAKE_USER"],
                          "password": os.environ["SNOWFLAKE_PASSWORD"],
                          "role": os.environ["SNOWFLAKE_ROLE"],
                          "warehouse": os.environ["SNOWFLAKE_WAREHOUSE"],
                          "database": "ANALYTICS_CI",
                          "schema": f"pr_{os.environ.get('PR_NUMBER', 'local')}",
                          "threads": 4,
                      }
                  },
              }
          }
          with open("profiles.yml", "w") as f:
              yaml.dump(profile, f, default_flow_style=False)
          print("profiles.yml created successfully")
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt debug
        run: dbt debug --target ci

      - name: dbt compile
        run: dbt compile --target ci
