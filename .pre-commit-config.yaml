repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Strips trailing spaces from every line
      - id: trailing-whitespace

      # Ensures every file ends with a newline (POSIX standard)
      - id: end-of-file-fixer

      # Validates YAML syntax — catches broken sources.yml, dbt_project.yml early
      # --unsafe is required because dbt uses custom YAML tags
      - id: check-yaml
        args: ["--unsafe"]

      # Catches merge conflict markers (<<<<<<, =======, >>>>>>>) left in files
      - id: check-merge-conflict

      # Blocks anyone from committing directly to main
      # All changes must come through a PR
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ── SQL linting ──────────────────────────────────────────────────────────────
  # Lints all .sql files under models/ on every commit.
  # Fails the commit if violations exist — developer must run
  # `sqlfluff fix models/` to auto-correct, then re-stage and retry.
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.1
    hooks:
      - id: sqlfluff-lint
        args: ["--dialect", "snowflake"]

  # ── Commit message format enforcement ────────────────────────────────────────
  # Validates the message AFTER you write it.
  # Runs on the commit-msg git hook stage (not the pre-commit stage).
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.6.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
